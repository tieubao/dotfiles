name: dotfiles-test

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 9 * * 1' # weekly Monday 9am UTC

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Lint install.sh
        run: shellcheck install.sh

      - name: Lint non-template scripts
        run: |
          for f in home/.chezmoiscripts/*.sh; do
            [ -f "$f" ] || continue
            echo "Checking $f"
            shellcheck "$f"
          done

      - name: Lint lib.sh
        run: shellcheck home/dot_config/dotfiles/lib.sh

  test-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install chezmoi
        run: brew install chezmoi

      - name: Link source directory
        run: |
          mkdir -p ~/.local/share
          ln -sf "$GITHUB_WORKSPACE/home" ~/.local/share/chezmoi

      - name: Write test config (skip 1Password prompts)
        run: |
          mkdir -p ~/.config/chezmoi
          cat > ~/.config/chezmoi/chezmoi.toml <<'EOF'
          [data]
            name = "CI Test"
            email = "ci@test.com"
            editor = "vim"
            headless = true
            use_1password = false
            op_account = ""
            op_vault = ""
          EOF

      - name: Dry run apply
        run: chezmoi apply --dry-run --verbose

      - name: Apply files only (skip scripts)
        run: chezmoi apply --exclude=scripts

      - name: Verify lib.sh deployed
        run: |
          if [ ! -f ~/.config/dotfiles/lib.sh ]; then
            echo "FAIL: lib.sh not deployed"
            exit 1
          fi
          echo "OK: lib.sh"

      - name: Verify key files deployed
        run: |
          for f in ~/.gitconfig ~/.config/fish/config.fish ~/.ssh/config; do
            if [ ! -f "$f" ]; then
              echo "FAIL: $f not found"
              exit 1
            fi
            echo "OK: $f"
          done

      - name: Validate managed files
        run: |
          count=$(chezmoi managed | wc -l | tr -d ' ')
          echo "Managed files: $count"
          chezmoi managed | head -50
          if [ "$count" -eq 0 ]; then
            echo "ERROR: No managed files found"
            exit 1
          fi

      - name: Check templates render
        run: |
          chezmoi execute-template '{{ .chezmoi.os }}' | grep darwin
          chezmoi execute-template '{{ .name }}' | grep "CI Test"
          chezmoi execute-template '{{ .use_1password }}' | grep false

      - name: Test template guard catches missing variable
        run: |
          mkdir -p /tmp/guard-test
          cat > /tmp/guard-test/chezmoi.toml <<'EOF'
          [data]
            name = "Test"
            email = "test@test.com"
            editor = "vim"
            use_1password = false
            op_account = ""
            op_vault = ""
          EOF
          if chezmoi execute-template \
            --config /tmp/guard-test/chezmoi.toml \
            '{{- if not (hasKey . "headless") }}GUARD_TRIGGERED{{ end -}}' 2>&1 \
            | grep -q "GUARD_TRIGGERED"; then
            echo "OK: template guard catches missing variable"
          else
            echo "FAIL: template guard did not trigger"
            exit 1
          fi
