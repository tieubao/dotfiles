[secrets]
# Key = "op://vault/item/field"  - one line per secret.
# Managed by the `add-secret` / `rm-secret` fish functions.
# Values are 1Password references, not secrets, so this file is safe to commit.
CLOUDFLARE_API_TOKEN = "op://Private/Cloudflare API Token/credential"
R2_ACCESS_KEY_ID = "op://Private/Cloudflare R2/username"
R2_SECRET_ACCESS_KEY = "op://Private/Cloudflare R2/credential"
