# tmux config — Ghostty + Fish
# Prefix: C-a

# ── General ───────────────────────────────────────────────────────────
set -g default-shell /opt/homebrew/bin/fish
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",ghostty:Tc,xterm-256color:Tc"
set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-clipboard on
set -g escape-time 0
set -g focus-events on
set -g status-interval 5
set -g detach-on-destroy off    # switch to another session on close

# ── Prefix ────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Splits ────────────────────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Navigation (vim-style) ───────────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Resize ────────────────────────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Windows ───────────────────────────────────────────────────────────
bind c new-window -c "#{pane_current_path}"
bind n next-window
bind p previous-window

# ── Session picker (fzf, replaces tmuxinator) ─────────────────────────
bind f display-popup -E -w 60% -h 60% "\
    tmux list-sessions -F '#{session_name}' | \
    fzf --reverse --header='Pick session' | \
    xargs tmux switch-client -t"

# ── Project session launcher ──────────────────────────────────────────
# C-a g = pick a project dir → create/attach named session
bind g display-popup -E -w 60% -h 60% "\
    fd --type d --max-depth 1 . ~/workspace ~/workspace/tieubao 2>/dev/null | \
    fzf --reverse --header='Open project' | \
    xargs -I{} sh -c 'name=\$(basename \"{}\"); \
    tmux has-session -t \"\$name\" 2>/dev/null || tmux new-session -d -s \"\$name\" -c \"{}\"; \
    tmux switch-client -t \"\$name\"'"

# ── Copy mode (vi) ───────────────────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# ── Reload ────────────────────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# ── Status bar (catppuccin mocha colors) ──────────────────────────────
set -g status-position top
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left "#[fg=#89b4fa,bold] #S "
set -g status-right "#[fg=#a6adc8]%H:%M  %b %d "
set -g status-left-length 30
set -g status-right-length 40
setw -g window-status-current-format "#[fg=#89b4fa,bold] #I:#W "
setw -g window-status-format "#[fg=#6c7086] #I:#W "

# ── Pane borders ──────────────────────────────────────────────────────
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"
