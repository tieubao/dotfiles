<svg width="100%" viewBox="0 0 680 560" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;border-radius:12px">
<rect width="680" height="560" fill="#ffffff" rx="12"/>
<defs>
<marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<marker id="ax" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#993C1D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<marker id="ag" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<text x="340" y="28" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">How secrets stay out of git AND off disk</text>

<!-- ==================== TIER 1: Deploy time ==================== -->
<text x="340" y="56" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="500" fill="#5F5E5A">Deploy time (chezmoi apply) - never contacts 1Password</text>

<!-- Repo box (left, green) -->
<rect x="20" y="70" width="200" height="118" rx="14" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="120" y="90" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="500" fill="#04342C">Git repo (public-safe)</text>
<rect x="34" y="104" width="172" height="24" rx="4" fill="#ffffff" stroke="#0F6E56" stroke-width="0.5"/>
<text x="120" y="120" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="11" fill="#04342C">secrets.fish.tmpl</text>
<rect x="34" y="134" width="172" height="46" rx="4" fill="#ffffff" stroke="#0F6E56" stroke-width="0.5"/>
<text x="120" y="150" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="10" fill="#0F6E56">set -gx VAR</text>
<text x="120" y="166" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="10" fill="#0F6E56">($_sc "VAR" "op://...")</text>

<!-- chezmoi apply (center, purple) -->
<rect x="250" y="100" width="180" height="60" rx="14" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="122" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="500" fill="#3C3489">chezmoi apply</text>
<text x="340" y="140" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#534AB7">Copies the lazy call verbatim.</text>
<text x="340" y="154" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#534AB7">No 1P contact. No popup.</text>

<!-- Disk (right, green) -->
<rect x="460" y="70" width="200" height="118" rx="14" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="560" y="90" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="500" fill="#04342C">On disk (per machine)</text>
<rect x="474" y="104" width="172" height="24" rx="4" fill="#ffffff" stroke="#0F6E56" stroke-width="0.5"/>
<text x="560" y="120" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="10" fill="#04342C">~/.config/fish/conf.d/secrets.fish</text>
<rect x="474" y="134" width="172" height="46" rx="4" fill="#ffffff" stroke="#0F6E56" stroke-width="0.5"/>
<text x="560" y="150" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="10" fill="#0F6E56">set -gx VAR</text>
<text x="560" y="166" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="10" fill="#0F6E56">($_sc "VAR" "op://...")</text>

<!-- Tier 1 arrows -->
<line x1="220" y1="130" x2="248" y2="130" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#a)"/>
<line x1="430" y1="130" x2="458" y2="130" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#a)"/>

<!-- Divider -->
<line x1="40" y1="210" x2="640" y2="210" stroke="#D4D2CA" stroke-width="1" stroke-dasharray="3 3"/>

<!-- ==================== TIER 2: Runtime ==================== -->
<text x="340" y="232" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="500" fill="#5F5E5A">Runtime (fish shell startup) - resolves the lazy call</text>

<!-- fish shell -->
<rect x="20" y="258" width="140" height="50" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="90" y="278" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="12" font-weight="500" fill="#2C2C2A">fish shell starts</text>
<text x="90" y="294" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="10" fill="#5F5E5A">sources secrets.fish</text>

<!-- secret-cache-read -->
<rect x="200" y="258" width="200" height="50" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="300" y="278" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="12" font-weight="500" fill="#3C3489">secret-cache-read</text>
<text x="300" y="294" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="10" fill="#534AB7">runs once per registered VAR</text>

<!-- macOS Keychain (blue) -->
<rect x="440" y="258" width="220" height="50" rx="10" fill="#E3F0FB" stroke="#1F6FB8" stroke-width="0.5"/>
<text x="550" y="278" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="12" font-weight="500" fill="#0F4A7D">macOS Keychain</text>
<text x="550" y="294" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="10" fill="#1F6FB8">per-machine cache, login keychain</text>

<!-- Top row arrows (solid) -->
<line x1="160" y1="283" x2="198" y2="283" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#a)"/>
<line x1="400" y1="283" x2="438" y2="283" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#a)"/>
<text x="419" y="275" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#5F5E5A">lookup</text>

<!-- env vars (below Keychain, green) -->
<rect x="440" y="370" width="220" height="50" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="550" y="390" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="12" font-weight="500" fill="#04342C">$OPENAI_API_KEY</text>
<text x="550" y="406" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="10" fill="#0F6E56">$GITHUB_TOKEN, ... (in shell env only)</text>

<!-- Keychain hit → env vars (solid green, labeled) -->
<line x1="550" y1="308" x2="550" y2="368" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#ag)"/>
<text x="610" y="342" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="500" fill="#0F6E56">hit: silent</text>

<!-- 1Password popup (red, dashed — miss branch) -->
<rect x="200" y="370" width="200" height="50" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5" stroke-dasharray="4 3"/>
<text x="300" y="390" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="12" font-weight="500" fill="#712B13">1Password popup</text>
<text x="300" y="406" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="10" fill="#993C1D">once per secret, first shell only</text>

<!-- scr → 1P popup (dashed red, labeled "miss") -->
<line x1="300" y1="308" x2="300" y2="368" stroke="#993C1D" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#ax)"/>
<text x="260" y="342" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="500" fill="#993C1D">miss</text>

<!-- 1P popup → Keychain (dashed red, feedback — caches value) -->
<path d="M400 395 L430 395 L430 295 L438 295" fill="none" stroke="#993C1D" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#ax)"/>
<text x="418" y="345" text-anchor="end" font-family="system-ui,sans-serif" font-size="10" fill="#993C1D">fetch + cache</text>

<!-- ==================== Bottom note ==================== -->
<rect x="40" y="460" width="600" height="80" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="482" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="500" fill="#2C2C2A">Real values live in: 1Password (source of truth) + macOS Keychain (per-machine cache) + shell env (process memory).</text>
<text x="340" y="502" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#5F5E5A">Never in git. Never on disk as plaintext. Same lazy call deploys to every machine.</text>
<text x="340" y="522" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#5F5E5A">Rotate: update 1Password, then `dotfiles secret refresh VAR` to invalidate the Keychain cache.</text>
</svg>
