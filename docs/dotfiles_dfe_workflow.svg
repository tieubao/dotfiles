<svg width="100%" viewBox="0 0 680 460" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;border-radius:12px">
<rect width="680" height="460" fill="#ffffff" rx="12"/>
<defs>
<marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<text x="340" y="28" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">dfe: edit, apply, and commit in one step</text>

<!-- Step 1: User runs dfe -->
<rect x="220" y="46" width="240" height="40" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="70" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#2C2C2A">dfe ~/.config/fish/config.fish</text>

<line x1="340" y1="86" x2="340" y2="110" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#a)"/>

<!-- Step 2: chezmoi edit --apply -->
<rect x="200" y="112" width="280" height="48" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="130" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#3C3489">chezmoi edit --apply</text>
<text x="340" y="148" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="11" fill="#534AB7">Opens the source file in your $EDITOR</text>

<line x1="340" y1="160" x2="340" y2="184" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#a)"/>

<!-- Step 3: User saves and closes editor -->
<rect x="220" y="186" width="240" height="40" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="210" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#2C2C2A">You save and close the editor</text>

<line x1="340" y1="226" x2="340" y2="250" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#a)"/>

<!-- Step 4: chezmoi applies -->
<rect x="200" y="252" width="280" height="48" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="340" y="270" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#04342C">chezmoi apply (automatic)</text>
<text x="340" y="288" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="11" fill="#0F6E56">Renders template, deploys to $HOME</text>

<line x1="340" y1="300" x2="340" y2="324" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#a)"/>

<!-- Step 5: git auto-commit -->
<rect x="200" y="326" width="280" height="48" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="344" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#3C3489">git add + commit (automatic)</text>
<text x="340" y="362" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="11" fill="#534AB7">"chore(config): update config.fish via dfe"</text>

<line x1="340" y1="374" x2="340" y2="398" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#a)"/>

<!-- Step 6: Done, print push -->
<rect x="200" y="400" width="280" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="416" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#2C2C2A">Done. Prints push command.</text>
<text x="340" y="434" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="11" fill="#5F5E5A">Push is always manual (--no-commit to skip step 5)</text>

<!-- Side labels for layers -->
<rect x="20" y="252" width="140" height="28" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="90" y="270" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="11" font-weight="500" fill="#04342C">Machine updated</text>
<path d="M160 266 L198 266" fill="none" stroke="#0F6E56" stroke-width="1" stroke-dasharray="4 3"/>

<rect x="20" y="326" width="140" height="28" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="90" y="344" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="11" font-weight="500" fill="#3C3489">Repo backed up</text>
<path d="M160 340 L198 340" fill="none" stroke="#534AB7" stroke-width="1" stroke-dasharray="4 3"/>
</svg>